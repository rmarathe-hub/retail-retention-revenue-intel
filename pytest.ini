[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra
markers =
    unit: fast unit tests
    integration: integration tests with local filesystem/tooling
    network: tests that require network access
    slow: slow-running tests
    data: tests that validate local dataset artifacts
    docs: documentation consistency tests
    db: tests that require local Docker PostgreSQL on host port 5433
    smoke: end-to-end smoke tests
    hygiene: repository hygiene and secret-safety tests
    sql: SQL schema and database structure tests
